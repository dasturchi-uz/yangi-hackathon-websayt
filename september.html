<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentyabr Qabuli | HITS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/main.js" defer></script>
<style>
  body { background: var(--paper); }
  
  .september-header {
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    padding: 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  
  .september-title {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--navy-950);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .september-subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 500;
    margin-top: 4px;
  }
</style>
</head>
<body>

<div class="admin-topbar">
  <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
    <div class="brand-row">
      <img src="assets/logo.png" alt="Hackathon IT School">
      <div>
        <div class="name">HACKATHON IT SCHOOL</div>
        <div class="sub">SENTYABR · QABUL_2026</div>
      </div>
    </div>
    <div style="display:flex; gap:8px;">
      <a href="admin.html" class="btn btn-ghost-dark btn-sm" style="text-decoration:none;"><i class="bi bi-arrow-left"></i> Arizalar ro'yxati</a>
      <a href="analytics.html" class="btn btn-navy btn-sm" style="text-decoration:none;"><i class="bi bi-pie-chart-fill"></i> Hisobotlar</a>
      <button class="btn btn-sm" style="background:rgba(217,83,79,.18); color:#ff8a86; border:1px solid rgba(217,83,79,.4);" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Chiqish</button>
    </div>
  </div>
</div>

<div class="container admin-main" style="padding-top:20px;">

  <div class="september-header">
    <div>
      <h2 class="september-title"><i class="bi bi-calendar-check-fill" style="color:#d97706;"></i> Sentyabr qabuli o'quvchilari</h2>
      <div class="september-subtitle" id="septemberSubtitle">Ro'yxat yuklanmoqda...</div>
    </div>
    <button class="btn btn-sm" style="background:var(--green); color:#fff; border:none;" id="exportSeptBtn">
      <i class="bi bi-file-earmark-excel-fill"></i> Excelga saqlash (CSV)
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:50px;">#</th>
          <th>F.I.SH</th>
          <th>Telefon</th>
          <th>Sinf</th>
          <th>Manzil</th>
          <th>Qatnov</th>
          <th>Holat</th>
          <th>Ro'yxatdan o'tgan</th>
        </tr>
      </thead>
      <tbody id="septemberTableBody">
        <tr><td colspan="8" style="text-align:center; padding:30px; color:var(--muted);">Yuklanmoqda...</td></tr>
      </tbody>
    </table>
  </div>
  
  <div id="emptyState" class="empty-state" style="display:none; margin-top:30px;">
    <div class="ic"><i class="bi bi-inbox" style="font-size:2.5rem; color:var(--muted);"></i></div>
    <div style="font-weight:700;">Hozircha hech kim yo'q</div>
    <div style="font-size:.85rem;">Sentyabr oyida keladigan o'quvchilar ushbu ro'yxatda paydo bo'ladi.</div>
  </div>

</div>

<script src="assets/september.js" defer></script>
</body>
</html>
