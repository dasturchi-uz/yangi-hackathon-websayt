<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentyabr Qabuli | HITS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/main.js" defer></script>

<style type="text/tailwindcss">
  @theme {
    --color-primary: #0f172a;
    --color-accent: #3b82f6;
  }
  body {
    @apply bg-slate-50 text-slate-900 font-sans antialiased;
    font-family: 'Inter', sans-serif;
  }

  /* Buttons */
  .btn { @apply inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl font-semibold transition-all duration-200; }
  .btn-navy { @apply bg-slate-900 text-white hover:bg-slate-800 hover:shadow-lg hover:shadow-slate-900/20; }
  
  /* Status Badges */
  .badge-status {
    @apply inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider;
  }
  .badge-new { @apply bg-blue-100 text-blue-700; }
  .badge-called { @apply bg-amber-100 text-amber-700; }
  .badge-no_answer { @apply bg-slate-200 text-slate-700; }
  .badge-accepted { @apply bg-emerald-100 text-emerald-700; }
  .badge-rejected { @apply bg-red-100 text-red-700; }

  /* KARTA DIZAYNI */
  .student-grid {
    @apply grid gap-4 mb-8;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  }

  .student-card {
    @apply bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:-translate-y-1 hover:shadow-lg hover:border-slate-300 transition-all duration-200 relative overflow-hidden;
  }

  .sc-head { @apply flex justify-between items-start mb-4; }
  .sc-name { @apply text-lg font-extrabold text-slate-900 leading-tight mb-2; }
  
  .sc-type { @apply inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider; }
  .type-new { @apply bg-blue-50 text-blue-600; }
  .type-old { @apply bg-emerald-50 text-emerald-600; }

  .sc-body { @apply grid grid-cols-2 gap-3 text-sm; }
  .sc-item { @apply flex flex-col gap-1; }
  .sc-item-label { @apply text-[10px] font-bold text-slate-400 uppercase tracking-widest; }
  .sc-item-value { @apply font-semibold text-slate-700; }

  .section-label {
    @apply flex items-center gap-3 text-xl font-extrabold text-slate-900 mb-4 pb-3 border-b-2 border-slate-200;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0 relative z-20">
    <div class="p-6 flex items-center gap-3 border-b border-slate-100">
      <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">H</div>
      <div>
        <h1 class="font-bold text-slate-900 text-sm tracking-wide">HACKATHON IT</h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Dashboard</p>
      </div>
    </div>
    <nav class="p-4 flex flex-col gap-2 flex-1 overflow-y-auto">
      <a href="admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors"><i class="bi bi-inbox text-lg"></i> Arizalar ro'yxati</a>
      <a href="students.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors"><i class="bi bi-mortarboard text-lg"></i> Joriy O'quvchilar</a>
      <a href="september.html" class="flex items-center gap-3 px-4 py-3 bg-amber-50 text-amber-700 rounded-xl font-semibold transition-colors"><i class="bi bi-calendar-event text-lg"></i> Sentyabr qabuli</a>
      <a href="analytics.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors"><i class="bi bi-pie-chart text-lg"></i> Hisobotlar</a>
    </nav>
    <div class="p-4 border-t border-slate-100">
      <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 w-full text-red-600 hover:bg-red-50 rounded-xl font-semibold transition-colors"><i class="bi bi-box-arrow-right text-lg"></i> Tizimdan chiqish</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative z-10">
    
    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shrink-0">
      <div>
        <h2 class="text-xl font-extrabold text-slate-900 flex items-center gap-2">
          <i class="bi bi-calendar-check-fill text-amber-500"></i> Sentyabr qabuli ro'yxati
        </h2>
        <div class="text-sm font-semibold text-slate-500 mt-1" id="septemberSubtitle">Ma'lumotlar yuklanmoqda...</div>
      </div>
      <button class="btn bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200" id="exportSeptBtn">
        <i class="bi bi-file-earmark-excel-fill"></i> Excelga saqlash
      </button>
    </header>

    <!-- CONTENT SCROLL -->
    <div class="flex-1 overflow-y-auto p-8" id="septemberContent">
      <div class="flex flex-col items-center justify-center h-full text-slate-400">
        <i class="bi bi-arrow-repeat animate-spin text-4xl mb-4"></i>
        <p class="font-medium">Yuklanmoqda...</p>
      </div>
    </div>
    
    <!-- EMPTY STATE -->
    <div id="emptyState" class="hidden py-16 flex-col items-center justify-center text-center absolute inset-0 m-auto mt-20 pointer-events-none">
      <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-slate-400 text-3xl">
        <i class="bi bi-inbox"></i>
      </div>
      <h4 class="text-lg font-bold text-slate-900 mb-1">Hozircha hech kim yo'q</h4>
      <p class="text-sm text-slate-500">Sentyabr oyida keladigan o'quvchilar ushbu ro'yxatda paydo bo'ladi.</p>
    </div>

  </main>

<script src="assets/september.js" defer></script>
</body>
</html>
