<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joriy O'quvchilar | HITS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<!-- CSV yuklash uchun kutubxona -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
<script src="assets/main.js" defer></script>
<style>
  body { background: var(--paper); }
  
  .students-header {
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-sm);
    padding: 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  
  .students-title {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--navy-950);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .students-subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 500;
    margin-top: 4px;
  }

  .action-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .class-accordion {
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--line);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  }

  .class-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--paper);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .class-header:hover {
    background: rgba(15,23,42,0.02);
  }

  .class-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--navy-950);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .class-stats {
    background: #fff;
    border: 1px solid var(--line);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
  }

  .class-body {
    display: none;
    padding: 0;
    border-top: 1px solid var(--line);
  }

  .class-body.open {
    display: block;
  }

  .std-table {
    width: 100%;
    border-collapse: collapse;
  }
  .std-table th, .std-table td {
    padding: 12px 20px;
    text-align: left;
    border-bottom: 1px solid var(--line);
    font-size: 0.9rem;
  }
  .std-table th {
    background: #fafafa;
    color: var(--muted);
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
  }
  .std-table tr:last-child td {
    border-bottom: none;
  }
  .std-table tbody tr:hover {
    background: rgba(15,23,42,0.01);
  }
</style>
</head>
<body>

<div class="admin-topbar">
  <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
    <div class="brand-row">
      <img src="assets/logo.png" alt="Hackathon IT School">
      <div>
        <div class="name">HACKATHON IT SCHOOL</div>
        <div class="sub">JORIY O'QUVCHILAR BAZASI</div>
      </div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
      <a href="admin.html" class="btn btn-ghost-dark btn-sm" style="text-decoration:none;"><i class="bi bi-arrow-left"></i> Arizalar ro'yxati</a>
      <a href="september.html" class="btn btn-sm" style="background:rgba(217,119,6,.1); color:#d97706; border:1px solid rgba(217,119,6,.2); text-decoration:none;"><i class="bi bi-calendar-event-fill"></i> Sentyabr qabuli</a>
      <a href="analytics.html" class="btn btn-navy btn-sm" style="text-decoration:none;"><i class="bi bi-pie-chart-fill"></i> Hisobotlar</a>
      <button class="btn btn-sm" style="background:rgba(217,83,79,.18); color:#ff8a86; border:1px solid rgba(217,83,79,.4);" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Chiqish</button>
    </div>
  </div>
</div>

<div class="container admin-main" style="padding-top:20px;">

  <div class="students-header">
    <div>
      <h2 class="students-title"><i class="bi bi-mortarboard-fill" style="color:var(--green);"></i> Maktab o'quvchilari</h2>
      <div class="students-subtitle" id="studentsSubtitle">Ma'lumotlar yuklanmoqda...</div>
    </div>
    
    <div class="action-buttons">
      <button class="btn btn-ghost-dark btn-sm" id="downloadTemplateBtn">
        <i class="bi bi-file-earmark-spreadsheet"></i> Shablon (CSV)
      </button>
      <label class="btn btn-sm" style="background:rgba(16,185,129,.1); color:var(--green); border:1px solid rgba(16,185,129,.2); cursor:pointer;">
        <i class="bi bi-upload"></i> Excel yuklash
        <input type="file" id="importCsvInput" accept=".csv" style="display:none;">
      </label>
      <button class="btn btn-sm" style="background:rgba(59,130,246,.1); color:var(--blue); border:1px solid rgba(59,130,246,.2);" id="migrateBtn">
        <i class="bi bi-arrow-down-up"></i> Qabul qilinganlarni olish
      </button>
      <button class="btn btn-navy btn-sm" id="addStdBtn">
        <i class="bi bi-person-plus-fill"></i> Qo'shish
      </button>
    </div>
  </div>

  <div id="studentsContent">
    <div style="text-align:center; padding:40px; color:var(--muted);">Yuklanmoqda...</div>
  </div>

</div>

<!-- Modal: Qo'shish / Tahrirlash -->
<div class="modal-backdrop-custom" id="stdModalBackdrop"></div>
<div class="modal-custom" id="stdModal">
  <div class="modal-card">
    <div class="modal-head">
      <h5 style="font-weight:800;" id="stdModalTitle"><i class="bi bi-person-fill" style="color:var(--navy-600);"></i> O'quvchi qo'shish</h5>
      <button class="modal-close" id="stdModalCloseBtn"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body-custom">
      <input type="hidden" id="stdId">
      <div style="margin-bottom:16px;">
        <label style="font-size:0.8rem; font-weight:700; color:var(--muted);">F.I.SH:</label>
        <input type="text" id="stdFullName" placeholder="O'quvchining ismi..." style="width:100%; border-radius:8px; border:1px solid var(--line); padding:10px 14px; font-weight:600;">
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:0.8rem; font-weight:700; color:var(--muted);">Sinf:</label>
        <select id="stdGrade" style="width:100%; border-radius:8px; border:1px solid var(--line); padding:10px 14px; font-weight:600;">
          <!-- JS to'ldiradi -->
        </select>
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:0.8rem; font-weight:700; color:var(--muted);">Telefon raqami:</label>
        <input type="text" id="stdPhone" placeholder="+998..." style="width:100%; border-radius:8px; border:1px solid var(--line); padding:10px 14px; font-family:'JetBrains Mono', monospace;">
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:0.8rem; font-weight:700; color:var(--muted);">Ota-ona (F.I.SH yoki Ma'lumot):</label>
        <input type="text" id="stdParent" placeholder="Ota-ona ismi yoki qoshimcha malumot..." style="width:100%; border-radius:8px; border:1px solid var(--line); padding:10px 14px;">
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:0.8rem; font-weight:700; color:var(--muted);">Qatnov / Yotoqxona:</label>
        <select id="stdTransport" style="width:100%; border-radius:8px; border:1px solid var(--line); padding:10px 14px;">
          <option value="">Tanlanmagan</option>
          <option value="Yotoqxonada turadi">Yotoqxonada turadi</option>
          <option value="Maktab transportida qatnaydi">Maktab transportida qatnaydi</option>
          <option value="O'zi qatnaydi">O'zi qatnaydi</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-navy" id="stdSaveBtn" style="width:100%;">Saqlash</button>
    </div>
  </div>
</div>

<script src="assets/students.js" defer></script>
</body>
</html>
