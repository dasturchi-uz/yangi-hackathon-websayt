  <!-- Google Font -->

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/style.css">

  <script src="assets/main.js" defer></script>
  <style>
    .student-card { transition: all 0.2s; border-radius: 12px; }
    .student-card:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .student-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #e9ecef; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#6c757d;}
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper" id="adminApp" style="display:none;">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <button id="logoutBtn" class="btn btn-sm btn-danger"><i class="fas fa-sign-out-alt"></i> Chiqish</button>
      </li>
    </ul>
  </nav>

  <!-- Main Sidebar Container -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4" style="background-color: var(--primary);">
    <!-- Brand Logo -->
    <a href="dashboard.html" class="brand-link" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
      <img src="assets/logo1.png" alt="HITS Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light" style="font-family: 'Sora', sans-serif; font-weight: 700!important; color:var(--accent);">HITS ADMIN</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar Menu -->
      <nav class="mt-4">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
          
          <li class="nav-item">
            <a href="dashboard.html" class="nav-link">
              <i class="nav-icon fas fa-tachometer-alt text-white"></i>
              <p>Bosh Sahifa</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="admin.html" class="nav-link">
              <i class="nav-icon fas fa-envelope text-white"></i>
              <p>Arizalar</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="students.html" class="nav-link active">
              <i class="nav-icon fas fa-users text-white"></i>
              <p>Joriy o'quvchilar</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="september.html" class="nav-link">
              <i class="nav-icon fas fa-leaf text-white"></i>
              <p>Sentyabr qabuli</p>
            </a>
          </li>

          <li class="nav-header">SOZLAMALAR</li>
          <li class="nav-item">
            <a href="settings.html" class="nav-link">
              <i class="nav-icon fas fa-cog text-white"></i>
              <p>Sinflar (Settings)</p>
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content Wrapper -->
  <div class="content-wrapper">
    <!-- Content Header -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2 align-items-center">
          <div class="col-sm-4">
            <h1 class="m-0"><i class="fas fa-user-graduate text-success"></i> Joriy O'quvchilar</h1>
            <p class="text-muted text-sm m-0 mt-1" id="studentsSubtitle">Yuklanmoqda...</p>
          </div>
          <div class="col-sm-8 text-right">
             <button id="downloadTemplateBtn" class="btn btn-sm btn-default mr-1"><i class="fas fa-file-csv"></i> Shablon</button>
             <button id="exportCsvBtn" class="btn btn-sm btn-success mr-1"><i class="fas fa-file-export"></i> Eksport (CSV)</button>
             
             <label class="btn btn-sm btn-outline-success mr-1 mb-0" style="cursor:pointer;">
               <i class="fas fa-upload"></i> Excel yuklash
               <input type="file" id="importCsvInput" accept=".csv" style="display:none;">
             </label>

             <button id="migrateBtn" class="btn btn-sm btn-info mr-1"><i class="fas fa-download"></i> Qabul qilinganlarni olish</button>
             <button id="addStdBtn" class="btn btn-sm btn-primary"><i class="fas fa-plus"></i> O'quvchi qo'shish</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
        
        <div id="studentsContent">
          <!-- Spinner -->
          <div class="text-center p-5">
            <i class="fas fa-spinner fa-spin fa-3x text-muted mb-3"></i>
            <p>Ma'lumotlar o'qilmoqda...</p>
          </div>
        </div>

      </div>
    </div>

</div>

<!-- ===================== QO'SHISH / TAHRIRLASH MODAL ===================== -->
<div class="modal fade" id="stdModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header bg-primary">
        <h5 class="modal-title text-white" id="stdModalTitle"><i class="fas fa-user-plus"></i> O'quvchi qo'shish</h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="stdId">
        
        <div class="form-group">
          <label>F.I.SH:</label>
          <input type="text" class="form-control" id="stdFullName" placeholder="To'liq ism">
        </div>
        
        <div class="form-group">
          <label>Sinf:</label>
          <select id="stdGrade" class="form-control">
            <!-- JS to'ldiradi -->
          </select>
        </div>
        
        <div class="form-group">
          <label>Telefon raqami:</label>
          <input type="text" class="form-control" id="stdPhone" placeholder="+998...">
        </div>
        
        <div class="form-group">
          <label>Ota-ona (F.I.SH yoki Ma'lumot):</label>
          <input type="text" class="form-control" id="stdParent" placeholder="Qo'shimcha ma'lumot">
        </div>
        
        <div class="form-group">
          <label>Qatnov turi:</label>
          <select id="stdTransport" class="form-control">
            <option value="">Tanlanmagan</option>
            <option value="Yotoqxonada turadi">Yotoqxonada turadi</option>
            <option value="Maktab transportida qatnaydi">Maktab transportida qatnaydi</option>
            <option value="O'zi qatnaydi">O'zi qatnaydi</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Bekor qilish</button>
        <button type="button" class="btn btn-primary" id="stdSaveBtn">Saqlash</button>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="assets/students.js" defer></script>

</body>
</html>
