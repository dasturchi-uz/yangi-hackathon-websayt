<!-- ===================== QO'SHISH / TAHRIRLASH MODAL ===================== -->
<div class="modal fade" id="stdModal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header bg-primary">
        <h5 class="modal-title text-white" id="stdModalTitle"><i class="fas fa-user-plus"></i> O'quvchi qo'shish</h5>
        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="stdId">
        
        <div class="form-group">
          <label>F.I.SH:</label>
          <input type="text" class="form-control" id="stdFullName" placeholder="To'liq ism">
        </div>
        
        <div class="form-group">
          <label>Sinf:</label>
          <select id="stdGrade" class="form-control">
            <!-- JS to'ldiradi -->
          </select>
        </div>
        
        <div class="form-group">
          <label>Telefon raqami:</label>
          <input type="text" class="form-control" id="stdPhone" placeholder="+998...">
        </div>
        
        <div class="form-group">
          <label>Ota-ona (F.I.SH yoki Ma'lumot):</label>
          <input type="text" class="form-control" id="stdParent" placeholder="Qo'shimcha ma'lumot">
        </div>
        
        <div class="form-group">
          <label>Qatnov turi:</label>
          <select id="stdTransport" class="form-control">
            <option value="">Tanlanmagan</option>
            <option value="Yotoqxonada turadi">Yotoqxonada turadi</option>
            <option value="Maktab transportida qatnaydi">Maktab transportida qatnaydi</option>
            <option value="O'zi qatnaydi">O'zi qatnaydi</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Bekor qilish</button>
        <button type="button" class="btn btn-primary" id="stdSaveBtn">Saqlash</button>
      </div>
    </div>
  </div>
</div>
