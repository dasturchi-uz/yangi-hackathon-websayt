<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hisobotlar | HITS Admin</title>

  <link rel="icon" href="assets/logo.png">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <!-- Theme style (AdminLTE) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="assets/main.js" defer></script>
</head>
<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper" id="adminApp" style="display:none;">

  <!-- Main Sidebar Container -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4" style="background-color: var(--primary);">
    <!-- Brand Logo -->
    <a href="index.html" class="brand-link" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
      <img src="assets/logo1.png" alt="HITS Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light" style="font-family: 'Sora', sans-serif; font-weight: 700!important; color:var(--accent);">HITS ADMIN</span>
    </a>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Sidebar Menu -->
      <nav class="mt-4">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
          
          <li class="nav-item">
            <a href="admin.html" class="nav-link">
              <i class="nav-icon fas fa-envelope text-white"></i>
              <p>Arizalar</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="students.html" class="nav-link">
              <i class="nav-icon fas fa-users text-white"></i>
              <p>Joriy o'quvchilar</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="september.html" class="nav-link">
              <i class="nav-icon fas fa-leaf text-white"></i>
              <p>Sentyabr qabuli</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="payments.html" class="nav-link">
              <i class="nav-icon fas fa-money-bill-wave text-white"></i>
              <p>To'lovlar</p>
            </a>
          </li>

          <li class="nav-item">
            <a href="analytics.html" class="nav-link active">
              <i class="nav-icon fas fa-chart-pie text-white"></i>
              <p>Hisobotlar</p>
            </a>
          </li>

          <li class="nav-header">TIZIM</li>
          <li class="nav-item">
            <a href="#" class="nav-link" id="logoutBtn">
              <i class="nav-icon fas fa-sign-out-alt text-danger"></i>
              <p class="text-danger">Chiqish</p>
            </a>
          </li>

        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content Wrapper -->
  <div class="content-wrapper">
    <!-- Content Header -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2 align-items-center">
          <div class="col-sm-6">
            <h1 class="m-0"><i class="fas fa-chart-pie text-info"></i> Analitika va Hisobotlar</h1>
            <p class="text-muted text-sm m-0 mt-1" id="loadingText">Ma'lumotlar tahlil qilinmoqda...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
        <div class="row">
          
          <!-- Transport Chart -->
          <div class="col-lg-6">
            <div class="card card-outline card-info">
              <div class="card-header">
                <h3 class="card-title"><i class="fas fa-bus mr-1"></i> Logistika (Transport/Yotoqxona)</h3>
              </div>
              <div class="card-body">
                <div class="chart">
                  <canvas id="transportChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                </div>
                <div id="transportDetails" class="mt-4 p-3 bg-light rounded text-sm d-flex justify-content-between">
                   <!-- JS to'ldiradi -->
                </div>
              </div>
            </div>
          </div>

          <!-- Grade Chart -->
          <div class="col-lg-6">
            <div class="card card-outline card-primary">
              <div class="card-header">
                <h3 class="card-title"><i class="fas fa-chart-bar mr-1"></i> Sinflar bo'yicha taqsimot</h3>
              </div>
              <div class="card-body">
                <div class="chart">
                  <canvas id="gradeChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="assets/analytics.js" defer></script>

</body>
</html>
