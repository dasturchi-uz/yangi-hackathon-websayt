<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hisobotlar | HITS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/main.js" defer></script>

<style type="text/tailwindcss">
  @theme {
    --color-primary: #0f172a;
    --color-accent: #3b82f6;
  }
  body {
    @apply bg-slate-50 text-slate-900 font-sans antialiased;
    font-family: 'Inter', sans-serif;
  }

  /* Cards */
  .chart-card {
    @apply bg-white rounded-2xl border border-slate-200 p-6 shadow-sm h-full flex flex-col relative overflow-hidden;
  }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
</style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col h-full shrink-0 relative z-20">
    <div class="p-6 flex items-center gap-3 border-b border-slate-100">
      <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">H</div>
      <div>
        <h1 class="font-bold text-slate-900 text-sm tracking-wide">HACKATHON IT</h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Dashboard</p>
      </div>
    </div>
    <nav class="p-4 flex flex-col gap-2 flex-1 overflow-y-auto">
      <a href="admin.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors"><i class="bi bi-inbox text-lg"></i> Arizalar ro'yxati</a>
      <a href="students.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors"><i class="bi bi-mortarboard text-lg"></i> Joriy O'quvchilar</a>
      <a href="september.html" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-colors"><i class="bi bi-calendar-event text-lg"></i> Sentyabr qabuli</a>
      <a href="analytics.html" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-700 rounded-xl font-semibold transition-colors"><i class="bi bi-pie-chart text-lg"></i> Hisobotlar</a>
    </nav>
    <div class="p-4 border-t border-slate-100">
      <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 w-full text-red-600 hover:bg-red-50 rounded-xl font-semibold transition-colors"><i class="bi bi-box-arrow-right text-lg"></i> Tizimdan chiqish</button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col h-full overflow-hidden bg-slate-50 relative z-10">
    
    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 px-8 py-5 flex justify-between items-center shrink-0">
      <div>
        <h2 class="text-xl font-extrabold text-slate-900 flex items-center gap-2">
          <i class="bi bi-pie-chart-fill text-indigo-600"></i> Analitika va Hisobotlar
        </h2>
        <div class="text-sm font-semibold text-slate-500 mt-1" id="loadingText">Ma'lumotlar tahlil qilinmoqda...</div>
      </div>
    </header>

    <!-- CONTENT SCROLL -->
    <div class="flex-1 overflow-y-auto p-8">
      
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        
        <!-- YOTOQXONA / QATNOV -->
        <div class="chart-card">
          <h3 class="font-extrabold text-slate-800 mb-2 text-lg"><i class="bi bi-bus-front-fill text-indigo-500 mr-2"></i> Logistika (Transport va Yotoqxona)</h3>
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Faqat qabul qilingan o'quvchilar uchun</p>
          <div class="flex-1 relative min-h-[250px]">
            <canvas id="transportChart"></canvas>
          </div>
          <div id="transportDetails" class="mt-6 flex justify-between bg-slate-50 border border-slate-100 p-4 rounded-xl text-sm">
             <!-- JS to'ldiradi -->
          </div>
        </div>

        <!-- SINFLAR BO'YICHA QABUL -->
        <div class="chart-card">
          <h3 class="font-extrabold text-slate-800 mb-2 text-lg"><i class="bi bi-bar-chart-fill text-indigo-500 mr-2"></i> Sinflar bo'yicha taqsimot</h3>
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-6">Qabul qilinganlarning sinflardagi ulushi</p>
          <div class="flex-1 relative min-h-[250px]">
            <canvas id="gradeChart"></canvas>
          </div>
        </div>

      </div>

    </div>
  </main>

<script src="assets/analytics.js" defer></script>
</body>
</html>
