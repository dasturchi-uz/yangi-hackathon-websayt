<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joriy O'quvchilar | HITS Admin</title>

<!-- Google Font: Source Sans Pro -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<!-- AdminLTE Theme style -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<!-- PapaParse for CSV Import -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
<script src="assets/main.js" defer></script>
<style>
  .accordion-btn { text-align: left; font-weight: 600; }
  .table-valign-middle td { vertical-align: middle; }
</style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">

<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <!-- Left navbar links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>

<div class="wrapper" id="adminApp" style="display:none;">

  <!-- Main Sidebar -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4" style="background-color: var(--primary);">
    <a href="index.html" class="brand-link" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
      <img src="assets/logo1.png" alt="HITS Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
      <span class="brand-text font-weight-light" style="font-family: 'Sora', sans-serif; font-weight: 700!important; color:var(--accent);">HITS ADMIN</span>
    </a>

    <div class="sidebar">
      <nav class="mt-4">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
          <li class="nav-item">
            <a href="admin.html" class="nav-link">
              <i class="nav-icon fas fa-envelope text-white"></i>
              <p>Arizalar</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="students.html" class="nav-link">
              <i class="nav-icon fas fa-users text-white"></i>
              <p>Joriy o'quvchilar</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="september.html" class="nav-link">
              <i class="nav-icon fas fa-leaf text-white"></i>
              <p>Sentyabr qabuli</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="payments.html" class="nav-link active">
              <i class="nav-icon fas fa-money-bill-wave text-white"></i>
              <p>To'lovlar</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="analytics.html" class="nav-link">
              <i class="nav-icon fas fa-chart-pie text-white"></i>
              <p>Hisobotlar</p>
            </a>
          </li>
          <li class="nav-header">TIZIM</li>
          <li class="nav-item">
            <a href="#" class="nav-link" id="logoutBtn">
              <i class="nav-icon fas fa-sign-out-alt text-danger"></i>
              <p class="text-danger">Chiqish</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <!-- Content Wrapper -->
  <div class="content-wrapper">
    
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2 align-items-center">
          <div class="col-sm-6">
            <h1 class="m-0 font-weight-bold"><i class="fas fa-money-bill-wave text-success mr-2"></i> To'lovlar ro'yxati</h1>
          </div>
          <div class="col-sm-6 text-right">
            <button class="btn btn-primary btn-sm" id="addPaymentBtn">
              <i class="fas fa-plus"></i> To'lov qo'shish
            </button>
            <button class="btn btn-default btn-sm ml-2" onclick="window.print()">
              <i class="fas fa-print"></i> Chop etish
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
        
        <!-- Filter Cards -->
        <div class="row">
          <div class="col-md-3 col-sm-6 col-12">
            <div class="info-box bg-success">
              <span class="info-box-icon"><i class="fas fa-wallet"></i></span>
              <div class="info-box-content">
                <span class="info-box-text">Shu oy tushum</span>
                <span class="info-box-number" id="thisMonthTotal">0 so'm</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Table Card -->
        <div class="card">
          <div class="card-header border-0">
            <div class="d-flex justify-content-between align-items-center">
              <div class="input-group input-group-sm" style="width: 250px;">
                <input type="text" id="searchInput" class="form-control float-right" placeholder="O'quvchini qidirish...">
                <div class="input-group-append">
                  <button type="submit" class="btn btn-default"><i class="fas fa-search"></i></button>
                </div>
              </div>
              <select id="monthFilter" class="form-control form-control-sm ml-2" style="width:150px;">
                <option value="">Barcha oylar</option>
                <option value="Yanvar">Yanvar</option>
                <option value="Fevral">Fevral</option>
                <option value="Mart">Mart</option>
              </select>
            </div>
          </div>
          <div class="card-body table-responsive p-0">
            <table class="table table-striped table-valign-middle table-hover">
              <thead>
                <tr>
                  <th>#</th>
                  <th>O'quvchi (F.I.SH)</th>
                  <th>Sinf</th>
                  <th>Oy</th>
                  <th>Summa</th>
                  <th>To'lov usuli</th>
                  <th>Sana</th>
                  <th class="text-right">Amallar</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="8" class="text-center p-4">Ma'lumotlar o'qilmoqda...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Payment Modal -->
<div class="modal fade" id="paymentModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="paymentModalTitle"><i class="fas fa-plus-circle"></i> Yangi to'lov qo'shish</h5>
        <button type="button" class="close text-white" data-dismiss="modal">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="payId">
        
        <div class="form-group">
          <label>O'quvchi: <span class="text-danger">*</span></label>
          <select class="form-control" id="payStudent">
            <option value="">Tanlang...</option>
          </select>
        </div>
        
        <div class="row">
          <div class="col-md-6 form-group">
            <label>Oy: <span class="text-danger">*</span></label>
            <select class="form-control" id="payMonth">
              <option value="Yanvar">Yanvar</option>
              <option value="Fevral">Fevral</option>
              <option value="Mart">Mart</option>
            </select>
          </div>
          
          <div class="col-md-6 form-group">
            <label>Summa (so'm): <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="number" class="form-control" id="payAmount">
              <div class="input-group-append"><span class="input-group-text">UZS</span></div>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label>To'lov usuli:</label>
          <select class="form-control" id="payMethod">
             <option value="Naqd">Naqd</option>
             <option value="Karta">Karta</option>
          </select>
        </div>
        
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Yopish</button>
        <button type="button" class="btn btn-success" id="savePaymentBtn">Saqlash</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/main.js"></script>
<script src="assets/payments.js"></script>
</body>
</html>
